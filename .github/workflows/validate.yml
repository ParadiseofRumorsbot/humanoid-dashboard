name: Validate data.js sources

# PR·수동 실행 시 data.js 출처를 검증한다(1차 화이트리스트 / 증권사 블랙리스트).
# main push 시의 배포 게이트는 deploy-pages.yml의 validate 잡이 담당한다.
on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate sources
        run: |
          python update_dashboard.py --validate | tee validate_out.txt
          if grep -q "차단된 2차 출처" validate_out.txt; then
            echo "::error::증권사(2차 가공) 출처가 data.js에 감지되었습니다. 1차 출처만 사용하세요."
            exit 1
          fi
