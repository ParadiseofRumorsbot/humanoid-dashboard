<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시장·경쟁 · Humanoid Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<style>
:root{--bg:#FAFAF6;--bg-grid:#F0EFE8;--bg-card:#FFF;--bg-soft:#F5F4ED;--ink:#0A0A08;--ink-2:#4A4A45;--ink-3:#8B8B82;--line:#E2E1D8;--line-s:#C5C3B7;--sans:'Pretendard',-apple-system,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;background-image:linear-gradient(var(--bg-grid) .5px,transparent .5px),linear-gradient(90deg,var(--bg-grid) .5px,transparent .5px);background-size:32px 32px}
main{max-width:1100px;margin:0 auto;padding:24px 20px 100px}
a{color:inherit}
.hdr{margin-bottom:16px}
.hdr-tag{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;display:flex;align-items:center;gap:10px}.hdr-tag::before{content:'';width:24px;height:1px;background:var(--ink-3)}
.hdr h1{font-size:28px;font-weight:300;letter-spacing:-.02em;line-height:1.2;margin-bottom:6px}
.hdr h1 b{font-family:var(--mono);font-size:.8em;background:var(--ink);color:var(--bg);padding:2px 10px 4px;border-radius:4px;display:inline-block;margin-right:6px;vertical-align:3px}
.hdr-sub{font-size:13px;color:var(--ink-2);max-width:680px}
.st-tabs{display:flex;gap:3px;background:var(--bg-soft);padding:3px;border-radius:7px;flex-wrap:wrap}
.st-btn{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.04em;padding:8px 12px;border:none;border-radius:5px;background:transparent;color:var(--ink-2);cursor:pointer;transition:all .18s}.st-btn:hover{color:var(--ink)}.st-btn.on{background:var(--ink);color:var(--bg)}
.sub-cap{font-size:11.5px;color:var(--ink-2);line-height:1.6;padding:9px 12px;margin-top:10px;background:var(--bg-soft);border-radius:7px;border-left:3px solid var(--line-s)}
.frame-wrap{margin-top:12px}
#frame{width:100%;border:0;display:block;background:transparent;min-height:600px}
@media(max-width:700px){main{padding:16px 12px 80px}.st-btn{font-size:10px;padding:7px 9px}}
</style>
</head>
<body>
<main>
  <header class="hdr">
    <div class="hdr-tag">Humanoid Dashboard</div>
    <h1><b>시장</b>·경쟁</h1>
    <p class="hdr-sub">시장 규모(TAM)와 경쟁 구도를 한곳에서. 얼마나 큰 시장인지 → 누가 얼마나 만드는지 순서로 본다.</p>
    <nav style="display:flex;gap:8px;margin:12px 0 20px;font-size:11.5px;flex-wrap:wrap"><a href="index.html" style="color:#6b7a99;text-decoration:none;padding:4px 10px;border-radius:6px;">대문</a><a href="framework.html" style="color:#6b7a99;text-decoration:none;padding:4px 10px;border-radius:6px;">프레임워크</a><a href="market.html" style="color:#4ecdc4;text-decoration:none;padding:4px 10px;border-radius:6px;background:#1e293b">시장·경쟁</a><a href="tech.html" style="color:#6b7a99;text-decoration:none;padding:4px 10px;border-radius:6px;">기술</a><a href="valuechain.html" style="color:#6b7a99;text-decoration:none;padding:4px 10px;border-radius:6px;">밸류체인</a><a href="valuation.html" style="color:#6b7a99;text-decoration:none;padding:4px 10px;border-radius:6px;">밸류에이션</a></nav>
  </header>

  <div class="st-tabs" id="subTabs">
    <button class="st-btn on" data-tab="tam"     onclick="showSub('tam',this)">TAM 시뮬레이터</button>
    <button class="st-btn"    data-tab="company" onclick="showSub('company',this)">기업별 TAM</button>
    <button class="st-btn"    data-tab="comp"    onclick="showSub('comp',this)">경쟁 현황</button>
  </div>
  <div class="sub-cap" id="subCap"></div>

  <div class="frame-wrap">
    <iframe id="frame" scrolling="no" title="시장·경쟁 서브 페이지"></iframe>
  </div>
</main>

<script>
/* 서브탭 = 원본 페이지를 그대로 담는 iframe (콘텐츠 무수정 · 스크립트 충돌 격리) */
var SUB = {
  tam:     'market_tam.html',
  company: 'market_company.html',
  comp:    'market_competition.html'
};
var CAP = {
  tam:     '로봇 출하 시나리오 × 1대당 BOM 원단위 → 부품별 TAM·배터리·전력 수요 시뮬레이터.',
  company: '부품별 TAM × M/S = 기업별 예상 매출. 공급 병목 히트맵으로 CAPA 갭 확인.',
  comp:    '중국 vs 미국 점유율·기술 성숙도·출하량·하모닉 M/S·Production Tracker·모터 제어 레이어.'
};

function fit(){
  var f = document.getElementById('frame');
  try {
    var doc = f.contentWindow.document;
    f.style.height = doc.body.scrollHeight + 'px';
  } catch(e) {}
}
function bindResize(){
  var f = document.getElementById('frame');
  try {
    fit();
    if (window.ResizeObserver) {
      var ro = new ResizeObserver(function(){ fit(); });
      ro.observe(f.contentWindow.document.body);
    }
  } catch(e) {}
}
function showSub(tab, btn){
  var btns = document.querySelectorAll('#subTabs .st-btn');
  for (var i=0;i<btns.length;i++) btns[i].classList.remove('on');
  if (btn) btn.classList.add('on');
  document.getElementById('subCap').textContent = CAP[tab];
  var f = document.getElementById('frame');
  f.src = SUB[tab];
}
document.getElementById('frame').addEventListener('load', bindResize);
window.addEventListener('resize', fit);
window.addEventListener('DOMContentLoaded', function(){ showSub('tam', document.querySelector('#subTabs .st-btn')); });
</script>
</body>
</html>
