<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기술 · 하드웨어 (해부 + 부품)</title>
<style>
:root{--bg:#FAFAF6;--bg-soft:#F5F4ED;--ink:#0A0A08;--ink-2:#4A4A45;--ink-3:#8B8B82;--line:#E2E1D8;--mono:'JetBrains Mono',ui-monospace,monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent}
.hw-jump{display:flex;gap:8px;align-items:center;font-family:var(--mono);font-size:11px;padding:10px 20px;flex-wrap:wrap}
.hw-jump a{text-decoration:none;color:var(--ink-2);background:var(--bg-soft);border:1px solid var(--line);padding:5px 12px;border-radius:6px;font-weight:600}
.hw-jump a:hover{color:var(--ink)}
.hw-divider{max-width:1100px;margin:8px auto;padding:14px 20px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--ink-3);display:flex;align-items:center;gap:10px}
.hw-divider::before,.hw-divider::after{content:'';flex:1;height:1px;background:var(--line)}
iframe{width:100%;border:0;display:block;background:transparent;min-height:400px}
</style>
</head>
<body>
<div class="hw-jump">
  <span style="color:var(--ink-3);font-weight:700">하드웨어</span>
  <a href="#sec-hw-anatomy">🔬 해부 (이야기책) ↓</a>
  <a href="#sec-hw-parts">🔩 부품 (데이터북) ↓</a>
</div>

<div id="sec-hw-anatomy"></div>
<iframe id="fA" src="anatomy.html" scrolling="no" title="휴머노이드 해부"></iframe>

<div class="hw-divider" id="sec-hw-parts">🔩 부품 기술 — 데이터북</div>
<iframe id="fB" src="components.html" scrolling="no" title="부품 기술"></iframe>

<script>
function fitInner(f){
  try { f.style.height = f.contentWindow.document.body.scrollHeight + 'px'; } catch(e) {}
}
['fA','fB'].forEach(function(id){
  var f = document.getElementById(id);
  f.addEventListener('load', function(){
    fitInner(f);
    try {
      if (window.ResizeObserver) new ResizeObserver(function(){ fitInner(f); }).observe(f.contentWindow.document.body);
    } catch(e) {}
  });
});
window.addEventListener('resize', function(){ fitInner(document.getElementById('fA')); fitInner(document.getElementById('fB')); });
</script>
</body>
</html>
